repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
        exclude: &exclude ^demos/

      - id: ruff-format
        exclude: *exclude

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.23.1
    hooks:
      - id: gitleaks
        files: ^(src/|tests/|demos/)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: end-of-file-fixer
        exclude: *exclude
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: *exclude

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        files: ^src/docs2db_api/.*\.py$
